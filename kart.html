<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Karty Binarne</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

.karty{
    display:grid;
    grid-template-columns: repeat(3, 200px);
    gap:20px;
    justify-content:center;
    margin-top:40px;
}

.karta{
    background:#222;
    padding:10px;
    border-radius:10px;
}

.karta img{
    width:100%;
}

.wartosc{
    margin-top:10px;
    font-size:20px;
}
</style>

</head>
<body>

<h1>Karty Binarne</h1>
<p>Klikaj karty aby uczyć się liczb binarnych</p>

<div class="karty">

<div class="karta">
<img src="1.png">
<div class="wartosc">1</div>
</div>

<div class="karta">
<img src="2.png">
<div class="wartosc">2</div>
</div>

<div class="karta">
<img src="3.png">
<div class="wartosc">4</div>
</div>

<div class="karta">
<img src="4.png">
<div class="wartosc">8</div>
</div>

<div class="karta">
<img src="5.png">
<div class="wartosc">16</div>
</div>

<div class="karta">
<img src="6.png">
<div class="wartosc">32</div>
</div>

<div class="karta">
<img src="7.png">
<div class="wartosc">64</div>
</div>

<div class="karta">
<img src="8.png">
<div class="wartosc">128</div>
</div>

<div class="karta">
<img src="9.png">
<div class="wartosc">256</div>
</div>

</div>

</body>
</html>
